name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - { bun: bun-darwin-arm64, name: darwin-arm64 }
          - { bun: bun-darwin-x64, name: darwin-x64 }
          - { bun: bun-linux-x64, name: linux-x64 }
          - { bun: bun-linux-arm64, name: linux-arm64 }
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: oven-sh/setup-bun@v2

      - run: pnpm install --frozen-lockfile

      - run: bun scripts/build-binary.ts ${{ matrix.target.bun }}

      - run: tar czf bluekeys-${{ matrix.target.name }}.tar.gz bluekeys

      - uses: actions/upload-artifact@v4
        with:
          name: bluekeys-${{ matrix.target.name }}
          path: bluekeys-${{ matrix.target.name }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: bluekeys-*.tar.gz
          generate_release_notes: true

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Compute SHA256 hashes
        id: hashes
        run: |
          echo "darwin_arm64=$(sha256sum bluekeys-darwin-arm64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "darwin_x64=$(sha256sum bluekeys-darwin-x64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "linux_arm64=$(sha256sum bluekeys-linux-arm64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "linux_x64=$(sha256sum bluekeys-linux-x64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew formula
        uses: actions/checkout@v4
        with:
          repository: anirban12d/homebrew-bluekeys
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Write updated formula
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${VERSION#v}"
          cat > homebrew-tap/Formula/bluekeys.rb << RUBY
          class Bluekeys < Formula
            desc "A feature-rich terminal typing test inspired by Monkeytype"
            homepage "https://github.com/anirban12d/bluekeys"
            version "${VERSION}"
            license "GPL-3.0-or-later"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/anirban12d/bluekeys/releases/download/v#{version}/bluekeys-darwin-arm64.tar.gz"
                sha256 "${{ steps.hashes.outputs.darwin_arm64 }}"
              else
                url "https://github.com/anirban12d/bluekeys/releases/download/v#{version}/bluekeys-darwin-x64.tar.gz"
                sha256 "${{ steps.hashes.outputs.darwin_x64 }}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/anirban12d/bluekeys/releases/download/v#{version}/bluekeys-linux-arm64.tar.gz"
                sha256 "${{ steps.hashes.outputs.linux_arm64 }}"
              else
                url "https://github.com/anirban12d/bluekeys/releases/download/v#{version}/bluekeys-linux-x64.tar.gz"
                sha256 "${{ steps.hashes.outputs.linux_x64 }}"
              end
            end

            def install
              bin.install "bluekeys"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/bluekeys --version")
            end
          end
          RUBY

      - name: Commit and push
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/bluekeys.rb
          git commit -m "bluekeys ${GITHUB_REF_NAME}"
          git push
